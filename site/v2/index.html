<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Executive Dashboard V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --porsche-red: #D5001C;
            --porsche-dark: #0F1012; /* Preto Fosco */
            --porsche-graphite: #1A1C1F; /* Grafite Escuro */
            --porsche-silver: #D1D5DB; /* Prata */
            --porsche-gold: #D4AF37; /* Detalhes em Dourado */
            --porsche-line: rgba(255,255,255,0.08);
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--porsche-dark); color: var(--text-light); padding-bottom: 50px; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 3rem; background: rgba(15, 16, 18, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--porsche-line);
        }
        nav .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.25em; color: var(--porsche-silver); text-transform: uppercase; }
        nav .logo span { color: var(--porsche-gold); }

        .hero {
            padding: 3.5rem 2rem; text-align: center; background: radial-gradient(circle at center, #1A1C1F 0%, var(--porsche-dark) 100%);
            border-bottom: 1px solid var(--porsche-line);
        }
        .hero h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.8rem; color: var(--porsche-silver); }
        .hero p { color: var(--text-muted); font-size: 0.95rem; font-weight: 300; }

        .container { padding: 2rem 3rem; max-width: 1600px; margin: 0 auto; }

        .filters {
            display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; padding: 1.5rem;
            background: var(--porsche-graphite); border: 1px solid var(--porsche-line); border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 200px; }
        .filter-group label { font-size: 0.7rem; color: var(--porsche-gold); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .filter-group select {
            background: var(--porsche-dark); color: var(--text-light); border: 1px solid rgba(255,255,255,0.1); padding: 0.7rem; border-radius: 6px;
            font-size: 0.85rem; outline: none;
        }

        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .kpi-card {
            background: var(--porsche-graphite); padding: 1.5rem; border-radius: 12px;
            border: 1px solid var(--porsche-line); border-top: 3px solid var(--porsche-red);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .kpi-card:hover { transform: translateY(-3px); border-color: var(--porsche-gold); }
        .kpi-card h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .kpi-card .value { font-size: 2rem; font-weight: 700; color: var(--text-light); }

        .map-box {
            background: var(--porsche-graphite); border: 1px solid var(--porsche-line); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .map-box h3 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; color: var(--porsche-silver); border-left: 3px solid var(--porsche-red); padding-left: 10px; }
        #mapa-porsche { height: 400px; width: 100%; border-radius: 8px; background: #111; }

        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .chart-box { background: var(--porsche-graphite); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--porsche-line); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .chart-box h3 { font-size: 1rem; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--porsche-silver); }

        @media(max-width: 768px) { .container { padding: 1rem; } .charts { grid-template-columns: 1fr; } nav { padding: 1rem; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Porsche <span>Premium</span></div>
    </nav>

    <div class="hero">
        <h1>Inteligência Automotiva</h1>
        <p>Monitoramento dinâmico e performance executiva de vendas Porsche mercado EUA.</p>
    </div>

    <div class="container">
        <div class="filters">
            <div class="filter-group">
                <label>Modelo</label>
                <select id="f-model"><option value="ALL">Todos os Modelos</option></select>
            </div>
            <div class="filter-group">
                <label>Cidade</label>
                <select id="f-city"><option value="ALL">Todas as Cidades</option></select>
            </div>
        </div>

        <div class="kpis">
            <div class="kpi-card">
                <h3>Unidades Vendidas</h3>
                <div class="value" id="kpi-qtd">0</div>
            </div>
            <div class="kpi-card" style="border-top-color: var(--porsche-gold);">
                <h3>Faturamento Total</h3>
                <div class="value" id="kpi-valor">$ 0</div>
            </div>
        </div>

        <div class="map-box">
            <h3>Distribuição Geográfica Real (EUA)</h3>
            <div id="mapa-porsche"></div>
        </div>

        <div class="charts">
            <div class="chart-box">
                <h3>Vendas por Modelo</h3>
                <canvas id="chartModelos"></canvas>
            </div>
            <div class="chart-box">
                <h3>Faturamento por Cidade</h3>
                <canvas id="chartCidades"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Dados simplificados para teste e garantia de funcionamento
        const dadosPorsche = [
            { modelo: "911 Turbo S", cidade: "Miami", preco: 210000 },
            { modelo: "Cayenne S", cidade: "New York", preco: 95000 },
            { modelo: "Taycan Turbo S", cidade: "Los Angeles", preco: 185000 },
            { modelo: "911 GT3 RS", cidade: "Seattle", preco: 240000 },
            { modelo: "Macan GTS", cidade: "Austin", preco: 85000 },
            { modelo: "Panamera 4S", cidade: "Chicago", preco: 110000 }
        ];

        const coordenadas = {
            "Miami": [25.7617, -80.1918], "New York": [40.7128, -74.0060],
            "Los Angeles": [34.0522, -118.2437], "Seattle": [47.6062, -122.3321],
            "Austin": [30.2672, -97.7431], "Chicago": [41.8781, -87.6298]
        };

        let map, markersGroup, graficoMod, graficoCid;

        function init() {
            // Preencher filtros
            const modSel = document.getElementById('f-model');
            const citSel = document.getElementById('f-city');
            const modelos = [...new Set(dadosPorsche.map(d => d.modelo))];
            const cidades = [...new Set(dadosPorsche.map(d => d.cidade))];
            
            modelos.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; modSel.appendChild(o); });
            cidades.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; citSel.appendChild(o); });

            // Inicializar Mapa Dark
            map = L.map('mapa-porsche', { attributionControl: false }).setView([37.8, -96], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            markersGroup = L.layerGroup().addTo(map);

            // Ouvir filtros
            modSel.addEventListener('change', filtrar);
            citSel.addEventListener('change', filtrar);

            filtrar();
        }

        function filtrar() {
            const mVal = document.getElementById('f-model').value;
            const cVal = document.getElementById('f-city').value;

            const filtrados = dadosPorsche.filter(d => {
                if(mVal !== "ALL" && d.modelo !== mVal) return false;
                if(cVal !== "ALL" && d.cidade !== cVal) return false;
                return true;
            });

            // Atualizar KPIs
            document.getElementById('kpi-qtd').textContent = filtrados.length;
            const total = filtrados.reduce((a, b) => a + b.preco, 0);
            document.getElementById('kpi-valor').textContent = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(total);

            // Atualizar Marcadores do Mapa
            markersGroup.clearLayers();
            filtrados.forEach(f => {
                if(coordenadas[f.cidade]) {
                    L.circleMarker(coordenadas[f.cidade], {
                        radius: 10, fillColor: '#D5001C', color: '#D4AF37', weight: 1.5, fillOpacity: 0.7
                    }).addTo(markersGroup).bindPopup(`<b>${f.cidade}</b><br>${f.modelo}<br>$${f.preco.toLocaleString()}`);
                }
            });

            atualizarGraficos(filtrados);
        }

        function atualizarGraficos(dados) {
            const modCtx = document.getElementById('chartModelos').getContext('2d');
            const cidCtx = document.getElementById('chartCidades').getContext('2d');

            // Agrupar dados
            const contagemModelos = {}; dados.forEach(d => contagemModelos[d.modelo] = (contagemModelos[d.modelo] || 0) + 1);
            const somaCidades = {}; dados.forEach(d => somaCidades[d.cidade] = (somaCidades[d.cidade] || 0) + d.preco);

            if(graficoMod) graficoMod.destroy();
            if(graficoCid) graficoCid.destroy();

            // Degradê vermelho para os gráficos
            const grad = modCtx.createLinearGradient(0, 0, 0, 200);
            grad.addColorStop(0, '#D5001C');
            grad.addColorStop(1, 'rgba(21,22,25,0.1)');

            graficoMod = new Chart(modCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(contagemModelos),
                    datasets: [{ label: 'Unidades', data: Object.values(contagemModelos), backgroundColor: grad, borderColor: '#D5001C', borderWidth: 1 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });

            graficoCid = new Chart(cidCtx, {
                type: 'line',
                data: {
                    labels: Object.keys(somaCidades),
                    datasets: [{ label: 'Faturamento ($)', data: Object.values(somaCidades), borderColor: '#D4AF37', backgroundColor: 'rgba(212,175,55,0.1)', fill: true, tension: 0.3 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
