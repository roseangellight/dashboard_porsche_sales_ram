<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Executive AI Dashboard V2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --porsche-red: #D5001C;
            --porsche-dark: #0F1012; 
            --porsche-graphite: #1A1C1F; 
            --porsche-silver: #D1D5DB; 
            --porsche-gold: #D4AF37; 
            --porsche-line: rgba(255,255,255,0.08);
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--porsche-dark); color: var(--text-light); line-height: 1.6; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 3rem; background: rgba(15, 16, 18, 0.85);
            backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid var(--porsche-line);
        }
        nav .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.3em; color: var(--porsche-silver); text-transform: uppercase; }
        nav .logo span { color: var(--porsche-gold); }
        nav ul { display: flex; gap: 2rem; list-style: none; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 500; transition: color 0.3s; }
        nav a:hover, nav a.active { color: var(--porsche-red); }

        .hero {
            min-height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 5rem 2rem; 
            border-bottom: 1px solid var(--porsche-line); box-shadow: inset 0 -100px 100px rgba(0,0,0,0.8);
            background: radial-gradient(circle at center, #23262c 0%, var(--porsche-dark) 100%), #131416;
        }
        .hero-badge { 
            margin-bottom: 1.5rem; padding: 0.4rem 1.5rem; border-radius: 4px; border: 1px solid var(--porsche-gold); 
            background: rgba(212, 175, 55, 0.06); color: var(--porsche-gold); letter-spacing: 0.3em; text-transform: uppercase; font-size: 0.65rem; font-weight: 700; 
        }
        .hero h1 { 
            font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; letter-spacing: 0.25em; margin-bottom: 1.2rem; text-transform: uppercase; 
            color: transparent; background: linear-gradient(135deg, #FFFFFF 20%, var(--porsche-silver) 60%, var(--porsche-gold) 100%);
            -webkit-background-clip: text; background-clip: text; padding-bottom: 0.2rem;
        }
        .hero p { font-size: 1.05rem; color: var(--text-muted); max-width: 850px; font-weight: 300; letter-spacing: 0.05em; }

        .container { padding: 3rem; max-width: 1600px; margin: 0 auto; }

        .filters {
            display: flex; gap: 1.2rem; margin-bottom: 2rem; flex-wrap: wrap; padding: 1.5rem;
            background: var(--porsche-graphite); border: 1px solid var(--porsche-line); border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-width: 220px; }
        .filter-group label { font-size: 0.7rem; color: var(--porsche-silver); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; }
        .filter-group select {
            background: var(--porsche-dark); color: var(--text-light); border: 1px solid rgba(255,255,255,0.12); padding: 0.8rem 1rem; border-radius: 6px;
            font-size: 0.9rem; outline: none; transition: all 0.3s; font-weight: 500;
        }
        .filter-group select:focus { border-color: var(--porsche-gold); box-shadow: 0 0 8px rgba(212, 175, 55, 0.2); }

        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .kpi-card {
            background: var(--porsche-graphite); padding: 1.8rem; border-radius: 12px; border: 1px solid var(--porsche-line); border-top: 3px solid var(--porsche-red); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.35); transition: transform 0.3s, border-color 0.3s;
        }
        .kpi-card:hover { transform: translateY(-4px); border-color: var(--porsche-gold); }
        .kpi-card h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 0.6rem; font-weight: 600; }
        .kpi-card .value { font-size: 2.2rem; font-weight: 700; color: var(--text-light); letter-spacing: -0.02em; }
        .kpi-card .sub { color: var(--porsche-silver); font-size: 0.8rem; margin-top: 0.4rem; font-weight: 300; }

        .executive-panel { display: grid; grid-template-columns: 1.4fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .panel-card { background: var(--porsche-graphite); border: 1px solid var(--porsche-line); padding: 1.8rem; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.35); }
