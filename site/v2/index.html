<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Executive AI Dashboard V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --porsche-red: #D5001C;
            --porsche-dark: #0F1012; 
            --porsche-graphite: #1A1C1F; 
            --porsche-silver: #D1D5DB; 
            --porsche-gold: #D4AF37; 
            --porsche-line: rgba(255,255,255,0.08);
            --text-light: #F3F4F6;
            --text-muted: #9CA3AF;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body {
            background-color: var(--porsche-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        nav {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 1.2rem 3rem; 
            background: rgba(15, 16, 18, 0.85);
            backdrop-filter: blur(20px); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid var(--porsche-line);
        }
        nav .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.3em; color: var(--porsche-silver); text-transform: uppercase; }
        nav .logo span { color: var(--porsche-gold); }
        nav ul { display: flex; gap: 2rem; list-style: none; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 500; transition: color 0.3s; }
        nav a:hover, nav a.active { color: var(--porsche-red); }

        /* Cabeçalho atualizado com a silhueta premium realista */
        .hero {
            min-height: 48vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 3rem 2rem 4rem 2rem; 
            border-bottom: 1px solid var(--porsche-line);
            background: radial-gradient(circle at center, rgba(26, 28, 31, 0.5) 0%, var(--porsche-dark) 100%), #131416;
        }
        
        /* Nova classe estritamente ajustada para a projeção realista do 911 */
        .porsche-silhouette {
            width: 100%;
            max-width: 680px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.7));
            opacity: 0.95;
        }

        .hero h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: 0.22em; margin-bottom: 1rem; text-transform: uppercase; color: var(--porsche-silver); }
        .hero p { font-size: 1rem; color: var(--text-muted); max-width: 800px; font-weight: 300; }
        .hero-badge { margin-bottom: 1rem; padding: 0.4rem 1.2rem; border-radius: 4px; border: 1px solid var(--porsche-gold); background: rgba(212, 175, 55, 0.08); color: var(--porsche-gold); letter-spacing: 0.25em; text-transform: uppercase; font-size: 0.7rem; font-weight: 600; }

        .container { padding: 3rem; max-width: 1600px; margin: 0 auto; }

        .filters {
            display: flex; gap: 1.2rem; margin-bottom: 2rem; flex-wrap: wrap; padding: 1.5rem;
            background: var(--porsche-graphite); border: 1px solid var(--porsche-line); border-radius: 12px; 
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-width: 220px; }
        .filter-group label { font-size: 0.7rem; color: var(--porsche-silver); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; }
        .filter-group select {
            background: var(--porsche-dark); color: var(--text-light); border: 1px solid rgba(255,255,255,0.12); padding: 0.8rem 1rem; border-radius: 6px;
            font-size: 0.9rem; outline: none; transition: all 0.3s;
        }
        .filter-group select:focus { border-color: var(--porsche-gold); }

        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .kpi-card {
            background: var(--porsche-graphite); padding: 1.8rem; border-radius: 12px;
            border: 1px solid var(--porsche-line); border-top: 3px solid var(--porsche-red); 
            transition: transform 0.3s;
        }
        .kpi-card:hover { transform: translateY(-4px); border-color: var(--porsche-gold); }
        .kpi-card h3 { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 0.6rem; }
        .kpi-card .value { font-size: 2.2rem; font-weight: 700; color: var(--text-light); }
        .kpi-card .sub { color: var(--porsche-silver); font-size: 0.8rem; margin-top: 0.4rem; font-weight: 300; }

        .executive-panel { display: grid; grid-template-columns: 1.4fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .panel-card { background: var(--porsche-graphite); border: 1px solid var(--porsche-line); padding: 1.8rem; border-radius: 12px; }
        .panel-card.featured { border-left: 4px solid var(--porsche-gold); }
        .panel-eyebrow { font-size: 0.7rem; color: var(--porsche-gold); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 0.6rem; font-weight: 600; }
        .panel-card h3 { font-size: 1.25rem; margin-bottom: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--porsche-silver); }
        .panel-card p { color: var(--text-muted); margin-bottom: 1.2rem; font-size: 0.95rem; font-weight: 300; }
        
        .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 1rem; }
        .metric-pill { background: var(--porsche-dark); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 0.9rem; text-align: center; }
        .metric-pill span { display: block; font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.4rem; }
        .metric-pill strong { font-size: 1rem; color: var(--porsche-silver); }

        .insight-list { list-style: none; display: grid; gap: 0.8rem; }
        .insight-list li { padding: 0.8rem 1rem; border-radius: 8px; background: var(--porsche-dark); border-left: 3px solid var(--porsche-red); font-size: 0.9rem; }

        .luxury-map-container { background: var(--porsche-graphite); border: 1px solid var(--porsche-line); border-radius: 12px; padding: 1.8rem; margin-bottom: 2.5rem; }
        #porsche-map { height: 450px; width: 100%; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #0b0c0d; }
