<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Executive Analytics - Master Dark Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --porsche-red: #D5001C;
            --porsche-dark-bg: #08090A;
            --porsche-panel-bg: #121417;
            --porsche-panel-light: #1A1D22;
            --porsche-silver: #F3F4F6;
            --porsche-muted: #9CA3AF;
            --porsche-gold: #D4AF37;
            --porsche-border: rgba(255, 255, 255, 0.08);
            --porsche-glow: rgba(213, 0, 28, 0.25);
            --card-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--porsche-dark-bg);
            color: var(--porsche-silver);
            overflow-x: hidden;
        }

        /* Top Header Premium Moderno */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(8, 9, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--porsche-border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-crest {
            width: 24px;
            height: 32px;
            background: linear-gradient(135deg, var(--porsche-gold), #B38F1D);
            border-radius: 3px 3px 50px 50px;
            position: relative;
            border: 1.5px solid #000;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
        }

        .brand-crest::after {
            content: '';
            position: absolute;
            top: 5px; left: 4px; right: 4px; bottom: 7px;
            background: var(--porsche-red);
            border-radius: 2px 2px 20px 20px;
        }

        .brand-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #FFF;
        }

        .brand-title span {
            color: var(--porsche-gold);
            font-weight: 300;
        }

        /* Menu de Páginas/Abas Operacionais */
        .tabs-nav {
            display: flex;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--porsche-border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--porsche-muted);
            padding: 0.7rem 1.8rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tab-btn:hover {
            color: #FFF;
        }

        .tab-btn.active {
            background: var(--porsche-red);
            color: #FFF;
            box-shadow: 0 4px 18px var(--porsche-glow);
        }

        /* Banner Hero Superior */
        .hero-section {
            padding: 4rem 3rem 2rem 3rem;
            max-width: 1650px;
            margin: 0 auto;
        }

        .hero-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: rgba(212, 175, 55, 0.07);
            border: 1px solid rgba(212, 175, 55, 0.25);
            color: var(--porsche-gold);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 1.2rem;
        }

        .hero-section h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #FFF;
            margin-bottom: 0.5rem;
        }

        .hero-section p {
            font-size: 1rem;
            color: var(--porsche-muted);
            font-weight: 300;
        }

        /* Layout Container Principal */
        .main-container {
            max-width: 1650px;
            margin: 0 auto;
            padding: 0 3rem 5rem 3rem;
        }

        /* Filtros Corporativos Planos */
        .filters-panel {
            background: linear-gradient(145deg, #15171A, #0D0E10);
            border: 1px solid var(--porsche-border);
            border-radius: var(--card-radius);
            padding: 1.8rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .filter-cell {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .filter-cell label {
            font-size: 0.68rem;
            color: var(--porsche-gold);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: 700;
        }

        .filter-cell select {
            background: #0A0B0C;
            color: #FFF;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.85rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-cell select:focus {
            border-color: var(--porsche-gold);
        }

        /* Matriz Global de KPIs */
        .kpi-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .kpi-block {
            background: linear-gradient(145deg, #141619, #0B0C0E);
            border: 1px solid var(--porsche-border);
            border-radius: var(--card-radius);
            padding: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        .kpi-block:hover {
            transform: translateY(-4px);
        }

        .kpi-block::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--porsche-silver);
        }

        .kpi-block.accent-red::before { background: var(--porsche-red); }
        .kpi-block.accent-gold::before { background: var(--porsche-gold); }

        .kpi-block h3 {
            font-size: 0.7rem;
            color: var(--porsche-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .kpi-block .value {
            font-size: 2.4rem;
            font-weight: 800;
            color: #FFF;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .kpi-block .trend {
            margin-top: 0.6rem;
            font-size: 0.78rem;
            color: var(--porsche-muted);
        }

        /* Estrutura de Abas e Páginas */
        .tab-panel {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-panel.active {
            display: block;
        }

        /* Layout Combinado de Gráficos */
        .dashboard-grid-2x1 {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .executive-board {
            background: var(--porsche-panel-bg);
            border: 1px solid var(--porsche-border);
            border-radius: var(--card-radius);
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }

        .board-title-wrapper {
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--porsche-red);
            padding-left: 12px;
        }

        .board-title-wrapper h2 {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #FFF;
        }

        /* Lista de Métricas e Performance */
        .insight-card-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            list-style: none;
        }

        .insight-item {
            padding: 1.1rem 1.3rem;
            background: #0B0C0E;
            border-left: 4px solid var(--porsche-gold);
            border-radius: 0 10px 10px 0;
            font-size: 0.85rem;
            color: var(--porsche-silver);
            line-height: 1.5;
        }

        /* Seção do Mapa */
        .map-wrapper {
            background: var(--porsche-panel-bg);
            border: 1px solid var(--porsche-border);
            border-radius: var(--card-radius);
            padding: 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }

        #us-luxury-map {
            height: 520px;
            width: 100%;
            border-radius: 12px;
            background: #070809;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Vitrine de Modelos Ativos */
        .car-matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .car-luxury-card {
            background: linear-gradient(135deg, #16181B, #0E0F12);
            border-radius: var(--card-radius);
            border: 1px solid var(--porsche-border);
            padding: 2rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .car-luxury-card:hover {
            border-color: var(--porsche-gold);
            transform: translateY(-3px);
        }

        .card-tag {
            position: absolute;
            top: 1.5rem; right: 1.5rem;
            padding: 0.3rem 0.8rem;
            background: rgba(213,0,28,0.12);
            border: 1px solid rgba(213,0,28,0.3);
            color: #FFA3A3;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
        }

        .card-city-name {
            font-size: 0.72rem;
            color: var(--porsche-gold);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 7
